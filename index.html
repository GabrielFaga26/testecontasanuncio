<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Contas de Anúncio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f7f5;
      --bg-tertiary: #f0ede8;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #9b9b9b;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg-secondary: #2c2c2e;
        --bg-tertiary: #3a3a3c;
        --text: #f2f2f7;
        --text-secondary: #aeaeb2;
        --text-tertiary: #636366;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    .topbar {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 1.75rem;
    }
    .topbar h1 { font-size: 20px; font-weight: 600; color: var(--text); }
    .topbar p  { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 16px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); background: var(--bg);
      color: var(--text); font-size: 13px; cursor: pointer;
      font-family: var(--font); transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg-secondary); }
    .btn-primary { background: var(--bg-secondary); font-weight: 500; }

    /* ── Metrics ── */
    .metrics {
      display: grid; grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px; margin-bottom: 1.5rem;
    }
    .metric {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem;
    }
    .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
    .metric-value { font-size: 24px; font-weight: 600; }
    .metric-value.green { color: #3B6D11; }
    .metric-value.red   { color: #A32D2D; }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 1.25rem; }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px; color: var(--text-tertiary); pointer-events: none;
    }
    .search-wrap input {
      width: 100%; padding: 9px 12px 9px 36px;
      border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
      background: var(--bg); color: var(--text); font-size: 13px;
      font-family: var(--font);
    }
    .search-wrap input:focus { outline: none; border-color: #378ADD; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .tab {
      padding: 7px 18px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border); background: transparent;
      color: var(--text-secondary); font-size: 13px; cursor: pointer;
      font-family: var(--font);
    }
    .tab.active {
      background: var(--bg); color: var(--text); font-weight: 500;
      border-color: var(--border-md);
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.5rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    th {
      text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 500;
      color: var(--text-secondary); background: var(--bg-secondary);
      border-bottom: 0.5px solid var(--border);
    }
    td {
      padding: 10px 14px; border-bottom: 0.5px solid var(--border);
      vertical-align: middle; color: var(--text);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg-secondary); cursor: pointer; }

    /* ── Badges ── */
    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 99px;
      font-size: 11px; font-weight: 500; white-space: nowrap;
    }
    .s-uso  { background: #EAF3DE; color: #3B6D11; }
    .s-val  { background: #E6F1FB; color: #185FA5; }
    .s-sem  { background: #FAEEDA; color: #854F0B; }
    .s-des  { background: #FCEBEB; color: #A32D2D; }
    .m-brl  { background: #E6F1FB; color: #185FA5; }
    .m-usd  { background: #EEEDFE; color: #534AB7; }
    .b-op   {
      background: var(--bg-secondary); color: var(--text-secondary);
      border: 0.5px solid var(--border); font-size: 11px;
    }

    /* ── Op blocks ── */
    .op-block {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden;
    }
    .op-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--bg-secondary);
      border-bottom: 0.5px solid var(--border); cursor: pointer;
    }
    .op-header-left { display: flex; align-items: center; gap: 8px; }
    .op-name { font-weight: 500; font-size: 14px; }
    .op-body { display: none; }
    .op-body.open { display: block; }
    .chevron { font-size: 10px; color: var(--text-tertiary); transition: transform 0.2s; }
    .chevron.open { transform: rotate(90deg); }

    /* ── Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: flex-start; justify-content: center; padding: 48px 16px;
    }
    .overlay.show { display: flex; }
    .modal {
      background: var(--bg); border-radius: var(--radius-lg);
      border: 0.5px solid var(--border-md); padding: 1.5rem;
      width: 440px; max-width: 100%; max-height: calc(100vh - 96px);
      overflow-y: auto;
    }
    .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 1.25rem; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .field input, .field select {
      width: 100%; padding: 8px 10px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); background: var(--bg);
      color: var(--text); font-size: 13px; font-family: var(--font);
    }
    .field input:focus, .field select:focus { outline: none; border-color: #378ADD; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .field-row .field { margin-bottom: 0; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
    .modal-actions .btn { flex: 1; }

    /* ── Op tags in form ── */
    .ops-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; min-height: 28px; }
    .op-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; background: var(--bg-secondary);
      border: 0.5px solid var(--border); border-radius: 99px;
      font-size: 12px; color: var(--text-secondary);
    }
    .op-tag button {
      background: none; border: none; cursor: pointer; padding: 0;
      color: var(--text-tertiary); font-size: 13px; line-height: 1;
    }
    .op-tag button:hover { color: var(--text); }
    .add-op-row { display: flex; gap: 6px; margin-top: 8px; }
    .add-op-row select {
      flex: 1; padding: 7px 10px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); background: var(--bg);
      color: var(--text); font-size: 13px; font-family: var(--font);
    }
    .add-op-row button {
      padding: 7px 14px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); background: var(--bg-secondary);
      color: var(--text); font-size: 13px; cursor: pointer; font-family: var(--font);
      white-space: nowrap;
    }
    .add-op-row button:hover { background: var(--bg-tertiary); }

    /* ── Detail modal ── */
    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-key { color: var(--text-secondary); }
    .detail-val { font-weight: 500; text-align: right; }

    .warn-box {
      font-size: 12px; color: #854F0B; background: #FAEEDA;
      padding: 8px 10px; border-radius: var(--radius-md); margin-bottom: 12px;
    }

    .empty {
      text-align: center; padding: 2.5rem 1rem;
      font-size: 13px; color: var(--text-secondary);
    }

    @media (max-width: 640px) {
      .metrics { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div>
      <h1>Contas de anúncio</h1>
      <p>Gestão e controle por operação</p>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="openModal('op')">+ Nova operação</button>
      <button class="btn btn-primary" onclick="openModal('conta')">+ Nova conta</button>
    </div>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar por nome, número, operação, cartão..." oninput="renderAll()">
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-op" onclick="switchTab('op')">Por operação</button>
    <button class="tab" id="tab-conta" onclick="switchTab('conta')">Por conta</button>
  </div>

  <div id="view-op"></div>
  <div id="view-conta" style="display:none;"></div>

</div>

<!-- Modal: Nova Operação -->
<div class="overlay" id="modal-op">
  <div class="modal">
    <div class="modal-title">Nova operação</div>
    <div class="field">
      <label>Nome da operação</label>
      <input id="op-nome" type="text" placeholder="ex: Marketing BR">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('op')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveOp()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Nova / Editar Conta -->
<div class="overlay" id="modal-conta">
  <div class="modal">
    <div class="modal-title" id="modal-conta-title">Nova conta de anúncio</div>
    <div id="no-op-warn" class="warn-box" style="display:none;">
      Cadastre ao menos uma operação antes de adicionar contas.
    </div>
    <div id="conta-form">
      <div class="field-row">
        <div class="field">
          <label>Nome da conta</label>
          <input id="c-nome" type="text" placeholder="ex: Conta Principal BR">
        </div>
        <div class="field">
          <label>Nº da conta</label>
          <input id="c-num" type="text" placeholder="ex: 1234567890">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Moeda</label>
          <select id="c-moeda">
            <option value="BRL">Real (BRL)</option>
            <option value="USD">Dólar (USD)</option>
          </select>
        </div>
        <div class="field">
          <label>Final do cartão</label>
          <input id="c-cartao" type="text" maxlength="4" placeholder="ex: 4321">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Status</label>
          <select id="c-status" onchange="onStatusChange(this)">
            <option value="ativo-uso">Ativa (em uso)</option>
            <option value="ativo-val">Ativa (em validação)</option>
            <option value="sem-uso">Sem uso</option>
            <option value="desativada">Desativada</option>
          </select>
        </div>
        <div class="field">
          <label>Data de atribuição</label>
          <input id="c-atrib" type="date">
        </div>
      </div>
      <div class="field" id="field-desativ" style="display:none;">
        <label>Data de desativação</label>
        <input id="c-desativ" type="date">
      </div>
      <div class="field">
        <label>Operações vinculadas</label>
        <div class="ops-tags" id="conta-ops-tags"></div>
        <div class="add-op-row">
          <select id="c-op-sel"></select>
          <button onclick="addOpToForm()">+ Adicionar</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('conta')">Cancelar</button>
      <button class="btn btn-primary" id="btn-sv-conta" onclick="saveConta()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Detalhe da Conta -->
<div class="overlay" id="modal-detail">
  <div class="modal" style="width:400px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <div class="modal-title" style="margin-bottom:0;" id="detail-title"></div>
      <button onclick="closeModal('detail')" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-secondary);">&times;</button>
    </div>
    <div id="detail-body"></div>
    <div class="modal-actions" style="margin-top:1.25rem;">
      <button class="btn" onclick="closeModal('detail')">Fechar</button>
      <button class="btn btn-primary" onclick="editFromDetail()">Editar</button>
    </div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────
  // SUPABASE — descomente e configure quando pronto
  // ─────────────────────────────────────────────
  // const SUPABASE_URL = 'https://xxxx.supabase.co';
  // const SUPABASE_KEY = 'your-anon-key';
  //
  // async function dbLoadOps() {
  //   const res = await fetch(`${SUPABASE_URL}/rest/v1/operacoes?select=*`, {
  //     headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  //   });
  //   return res.json();
  // }
  //
  // async function dbLoadContas() {
  //   const res = await fetch(`${SUPABASE_URL}/rest/v1/contas?select=*`, {
  //     headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  //   });
  //   return res.json();
  // }
  //
  // async function dbSaveConta(conta) {
  //   await fetch(`${SUPABASE_URL}/rest/v1/contas`, {
  //     method: 'POST',
  //     headers: {
  //       apikey: SUPABASE_KEY,
  //       Authorization: `Bearer ${SUPABASE_KEY}`,
  //       'Content-Type': 'application/json',
  //       Prefer: 'return=minimal'
  //     },
  //     body: JSON.stringify(conta)
  //   });
  // }
  // ─────────────────────────────────────────────

  const TODAY = new Date().toISOString().slice(0, 10);

  // ── Estado ──
  let ops = [];
  let accounts = [];
  let currentTab = 'op';
  let editingId = null;
  let detailId = null;
  let formOps = [];

  // ── Persistência (localStorage) ──
  function save() {
    localStorage.setItem('adm_ops', JSON.stringify(ops));
    localStorage.setItem('adm_contas', JSON.stringify(accounts));
  }

  function load() {
    const savedOps = localStorage.getItem('adm_ops');
    const savedContas = localStorage.getItem('adm_contas');
    if (savedOps) {
      ops = JSON.parse(savedOps);
    } else {
      ops = ['Marketing BR', 'Vendas SP', 'Vendas RJ', 'Performance'];
    }
    if (savedContas) {
      accounts = JSON.parse(savedContas);
    } else {
      accounts = [
        { id: 1, nome: 'Conta Principal BR', num: '1234567890', ops: ['Marketing BR'], moeda: 'BRL', cartao: '4321', status: 'ativo-uso', atrib: '2025-01-10', desativ: null },
        { id: 2, nome: 'Conta Validação USD', num: '9876543210', ops: ['Marketing BR', 'Performance'], moeda: 'USD', cartao: '8899', status: 'ativo-val', atrib: '2025-03-01', desativ: null },
        { id: 3, nome: 'Conta SP Pausada', num: '5551234567', ops: ['Vendas SP'], moeda: 'BRL', cartao: '1122', status: 'sem-uso', atrib: '2024-11-05', desativ: null },
        { id: 4, nome: 'Conta RJ Desativada', num: '7778889990', ops: ['Vendas RJ'], moeda: 'BRL', cartao: '5566', status: 'desativada', atrib: '2024-06-01', desativ: '2025-02-15' },
        { id: 5, nome: 'Performance USD', num: '6667778889', ops: ['Performance', 'Vendas SP'], moeda: 'USD', cartao: '3344', status: 'ativo-uso', atrib: '2025-02-20', desativ: null },
      ];
    }
  }

  // ── Helpers ──
  const statusLabel = {
    'ativo-uso': 'Ativa (em uso)',
    'ativo-val': 'Ativa (em validação)',
    'sem-uso':   'Sem uso',
    'desativada': 'Desativada'
  };
  const statusClass = {
    'ativo-uso': 's-uso',
    'ativo-val': 's-val',
    'sem-uso':   's-sem',
    'desativada': 's-des'
  };

  function bStatus(s) {
    return `<span class="badge ${statusClass[s]}">${statusLabel[s]}</span>`;
  }
  function bMoeda(m) {
    return `<span class="badge ${m === 'BRL' ? 'm-brl' : 'm-usd'}">${m}</span>`;
  }
  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, dd] = d.split('-');
    return `${dd}/${m}/${y}`;
  }
  function diasAtivos(a) {
    const from = new Date(a.atrib);
    const to = (a.status === 'desativada' && a.desativ) ? new Date(a.desativ) : new Date();
    return Math.max(0, Math.round((to - from) / (1000 * 60 * 60 * 24)));
  }
  function filtered() {
    const q = (document.getElementById('search').value || '').trim().toLowerCase();
    if (!q) return accounts;
    return accounts.filter(a =>
      a.nome.toLowerCase().includes(q) ||
      a.num.toLowerCase().includes(q) ||
      a.ops.some(o => o.toLowerCase().includes(q)) ||
      (a.cartao && a.cartao.includes(q))
    );
  }

  // ── Render ──
  function renderMetrics() {
    const total   = accounts.length;
    const ativos  = accounts.filter(a => a.status === 'ativo-uso' || a.status === 'ativo-val').length;
    const desativ = accounts.filter(a => a.status === 'desativada').length;
    document.getElementById('metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Total de contas</div><div class="metric-value">${total}</div></div>
      <div class="metric"><div class="metric-label">Ativas</div><div class="metric-value green">${ativos}</div></div>
      <div class="metric"><div class="metric-label">Desativadas</div><div class="metric-value red">${desativ}</div></div>
      <div class="metric"><div class="metric-label">Operações</div><div class="metric-value">${ops.length}</div></div>
    `;
  }

  function renderOpView() {
    const list = filtered();
    if (!ops.length) {
      document.getElementById('view-op').innerHTML = '<div class="empty">Nenhuma operação cadastrada. Clique em "+ Nova operação" para começar.</div>';
      return;
    }
    let html = '';
    ops.forEach(op => {
      const contas = list.filter(a => a.ops.includes(op));
      const desativ = contas.filter(a => a.status === 'desativada').length;
      html += `
        <div class="op-block">
          <div class="op-header" onclick="toggleOp(this)">
            <div class="op-header-left">
              <span class="op-name">${op}</span>
              ${desativ > 0 ? `<span class="badge s-des">${desativ} desativada${desativ > 1 ? 's' : ''}</span>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:12px;color:var(--text-secondary);">${contas.length} conta${contas.length !== 1 ? 's' : ''}</span>
              <span class="chevron">&#9654;</span>
            </div>
          </div>
          <div class="op-body">
            ${contas.length ? `
              <div class="table-wrap" style="border-radius:0;border:none;margin-bottom:0;">
                <table>
                  <thead><tr>
                    <th style="width:24%">Nome</th>
                    <th style="width:20%">Nº conta</th>
                    <th style="width:14%">Moeda</th>
                    <th style="width:26%">Status</th>
                    <th style="width:16%">Dias ativos</th>
                  </tr></thead>
                  <tbody>
                    ${contas.map(c => `
                      <tr onclick="openDetail(${c.id})">
                        <td style="font-weight:500;">${c.nome}</td>
                        <td style="font-family:var(--font-mono);font-size:12px;">${c.num}</td>
                        <td>${bMoeda(c.moeda)}</td>
                        <td>${bStatus(c.status)}</td>
                        <td style="color:var(--text-secondary);font-size:12px;">${diasAtivos(c)} dias</td>
                      </tr>`).join('')}
                  </tbody>
                </table>
              </div>` : `<div style="padding:1rem 16px;font-size:13px;color:var(--text-secondary);">Nenhuma conta vinculada a esta operação.</div>`}
          </div>
        </div>`;
    });
    document.getElementById('view-op').innerHTML = html;
  }

  function renderContaView() {
    const list = filtered();
    const rows = list.map(c => `
      <tr onclick="openDetail(${c.id})">
        <td style="font-weight:500;">${c.nome}</td>
        <td style="font-family:var(--font-mono);font-size:12px;">${c.num}</td>
        <td><div style="display:flex;flex-wrap:wrap;gap:4px;">${c.ops.map(o => `<span class="badge b-op">${o}</span>`).join('')}</div></td>
        <td>${bMoeda(c.moeda)}</td>
        <td>${bStatus(c.status)}</td>
        <td style="color:var(--text-secondary);font-size:12px;">${diasAtivos(c)} dias</td>
      </tr>`).join('');
    document.getElementById('view-conta').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:20%">Nome</th>
            <th style="width:18%">Nº conta</th>
            <th style="width:22%">Operações</th>
            <th style="width:10%">Moeda</th>
            <th style="width:18%">Status</th>
            <th style="width:12%">Dias ativos</th>
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="6"><div class="empty">Nenhuma conta encontrada</div></td></tr>'}</tbody>
        </table>
      </div>`;
  }

  function renderAll() {
    renderMetrics();
    renderOpView();
    renderContaView();
  }

  // ── Op block toggle ──
  function toggleOp(header) {
    const body = header.nextElementSibling;
    const chev = header.querySelector('.chevron');
    const open = body.classList.toggle('open');
    chev.classList.toggle('open', open);
  }

  // ── Tabs ──
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-op').classList.toggle('active', tab === 'op');
    document.getElementById('tab-conta').classList.toggle('active', tab === 'conta');
    document.getElementById('view-op').style.display    = tab === 'op'    ? 'block' : 'none';
    document.getElementById('view-conta').style.display = tab === 'conta' ? 'block' : 'none';
  }

  // ── Modal ──
  function openModal(type, id) {
    if (type === 'conta') {
      editingId = id || null;
      document.getElementById('modal-conta-title').textContent = editingId ? 'Editar conta' : 'Nova conta de anúncio';
      const warn = document.getElementById('no-op-warn');
      const form = document.getElementById('conta-form');
      const sv   = document.getElementById('btn-sv-conta');
      if (!ops.length) {
        warn.style.display = 'block'; form.style.display = 'none'; sv.style.display = 'none';
      } else {
        warn.style.display = 'none'; form.style.display = 'block'; sv.style.display = 'block';
        document.getElementById('c-op-sel').innerHTML = ops.map(o => `<option value="${o}">${o}</option>`).join('');
        if (editingId) {
          const a = accounts.find(x => x.id === editingId);
          document.getElementById('c-nome').value   = a.nome;
          document.getElementById('c-num').value    = a.num;
          document.getElementById('c-moeda').value  = a.moeda;
          document.getElementById('c-cartao').value = a.cartao || '';
          document.getElementById('c-status').value = a.status;
          document.getElementById('c-atrib').value  = a.atrib || TODAY;
          document.getElementById('c-desativ').value = a.desativ || TODAY;
          document.getElementById('field-desativ').style.display = a.status === 'desativada' ? 'block' : 'none';
          formOps = [...a.ops];
        } else {
          document.getElementById('c-nome').value   = '';
          document.getElementById('c-num').value    = '';
          document.getElementById('c-moeda').value  = 'BRL';
          document.getElementById('c-cartao').value = '';
          document.getElementById('c-status').value = 'ativo-uso';
          document.getElementById('c-atrib').value  = TODAY;
          document.getElementById('c-desativ').value = TODAY;
          document.getElementById('field-desativ').style.display = 'none';
          formOps = [];
        }
        renderFormOps();
      }
    }
    document.getElementById('modal-' + type).classList.add('show');
  }

  function closeModal(type) {
    document.getElementById('modal-' + type).classList.remove('show');
  }

  function onStatusChange(sel) {
    document.getElementById('field-desativ').style.display = sel.value === 'desativada' ? 'block' : 'none';
    if (sel.value === 'desativada') document.getElementById('c-desativ').value = TODAY;
  }

  // ── Ops no formulário ──
  function renderFormOps() {
    document.getElementById('conta-ops-tags').innerHTML = formOps.map(o => `
      <span class="op-tag">${o}
        <button onclick="removeFormOp('${o}')" title="Remover">&times;</button>
      </span>`).join('');
  }

  function addOpToForm() {
    const v = document.getElementById('c-op-sel').value;
    if (v && !formOps.includes(v)) { formOps.push(v); renderFormOps(); }
  }

  function removeFormOp(o) {
    formOps = formOps.filter(x => x !== o);
    renderFormOps();
  }

  // ── Salvar ──
  function saveOp() {
    const n = document.getElementById('op-nome').value.trim();
    if (!n) return;
    if (!ops.includes(n)) ops.push(n);
    document.getElementById('op-nome').value = '';
    closeModal('op');
    save();
    renderAll();
  }

  function saveConta() {
    const nome   = document.getElementById('c-nome').value.trim();
    const num    = document.getElementById('c-num').value.trim();
    const moeda  = document.getElementById('c-moeda').value;
    const cartao = document.getElementById('c-cartao').value.trim();
    const status = document.getElementById('c-status').value;
    const atrib  = document.getElementById('c-atrib').value || TODAY;
    const desativ = status === 'desativada' ? (document.getElementById('c-desativ').value || TODAY) : null;
    if (!nome || !num) return;
    const opsVal = formOps.length ? [...formOps] : (ops.length ? [ops[0]] : []);
    if (editingId) {
      const idx = accounts.findIndex(x => x.id === editingId);
      accounts[idx] = { ...accounts[idx], nome, num, moeda, cartao, status, atrib, desativ, ops: opsVal };
    } else {
      accounts.push({ id: Date.now(), nome, num, moeda, cartao, status, atrib, desativ, ops: opsVal });
    }
    closeModal('conta');
    save();
    renderAll();
  }

  // ── Detalhe ──
  function openDetail(id) {
    const a = accounts.find(x => x.id === id);
    detailId = id;
    document.getElementById('detail-title').textContent = a.nome;
    document.getElementById('detail-body').innerHTML = `
      <div class="detail-row"><span class="detail-key">Nº da conta</span><span class="detail-val" style="font-family:var(--font-mono);font-size:12px;">${a.num}</span></div>
      <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val">${bStatus(a.status)}</span></div>
      <div class="detail-row"><span class="detail-key">Moeda</span><span class="detail-val">${bMoeda(a.moeda)}</span></div>
      <div class="detail-row"><span class="detail-key">Final do cartão</span><span class="detail-val">${a.cartao ? '•••• ' + a.cartao : '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Operações</span><span class="detail-val">${a.ops.join(', ')}</span></div>
      <div class="detail-row"><span class="detail-key">Data de atribuição</span><span class="detail-val">${fmtDate(a.atrib)}</span></div>
      ${a.status === 'desativada' ? `<div class="detail-row"><span class="detail-key">Data de desativação</span><span class="detail-val">${fmtDate(a.desativ)}</span></div>` : ''}
      <div class="detail-row"><span class="detail-key">Dias ativos</span><span class="detail-val">${diasAtivos(a)} dias</span></div>
    `;
    openModal('detail');
  }

  function editFromDetail() {
    closeModal('detail');
    openModal('conta', detailId);
  }

  // ── Init ──
  load();
  renderAll();
</script>
</body>
</html>
